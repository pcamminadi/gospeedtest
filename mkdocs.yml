site_name: gospeedtest
site_description: Open-source self-hosted internet speed test, written in Go.
site_url: https://pcamminadi.github.io/gospeedtest/
repo_url: https://github.com/pcamminadi/gospeedtest
repo_name: pcamminadi/gospeedtest
edit_uri: edit/main/docs/
copyright: MIT licensed — Built with Claude Code

theme:
  name: material
  language: en
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Server reference: server.md
  - CLI reference: cli.md
  - Web UI: web-ui.md
  - How the test works: protocol.md
  - Privacy: privacy.md
  - Contributing: contributing.md
  - Releases & CI: releases.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/pcamminadi/gospeedtest
