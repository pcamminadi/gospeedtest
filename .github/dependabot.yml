version: 2
updates:
  # Keep the SHA-pinned action versions current. Dependabot opens a PR
  # whenever any of the actions used in `.github/workflows/*.yml` ships a
  # newer release — bumping both the SHA and the # vX.Y.Z comment.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
    labels:
      - dependencies
      - github-actions

  # Go module dependencies (charm libs, coder/websocket, etc.).
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps"
    labels:
      - dependencies
      - go
