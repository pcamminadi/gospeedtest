name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
            ext: .exe
          - goos: windows
            goarch: arm64
            ext: .exe
    env:
      GOOS:        ${{ matrix.goos }}
      GOARCH:      ${{ matrix.goarch }}
      CGO_ENABLED: 0
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: stable
          cache: true

      - name: build binary
        run: |
          mkdir -p dist
          OUT="dist/gospeedtest_${GITHUB_REF_NAME}_${GOOS}_${GOARCH}${{ matrix.ext }}"
          go build \
            -trimpath \
            -ldflags "-s -w -X main.versionTag=${GITHUB_REF_NAME}" \
            -o "$OUT" \
            ./cmd/gospeedtest

      - name: package archive
        run: |
          set -euo pipefail
          cd dist
          BIN="gospeedtest_${GITHUB_REF_NAME}_${GOOS}_${GOARCH}${{ matrix.ext }}"
          STAGE="stage_${GOOS}_${GOARCH}"
          mkdir -p "$STAGE"
          cp "$BIN" "$STAGE/gospeedtest${{ matrix.ext }}"
          cp ../README.md ../LICENSE "$STAGE/"
          if [ "${GOOS}" = "windows" ]; then
            (cd "$STAGE" && zip -r "../gospeedtest_${GITHUB_REF_NAME}_${GOOS}_${GOARCH}.zip" .)
          else
            tar -C "$STAGE" -czf "gospeedtest_${GITHUB_REF_NAME}_${GOOS}_${GOARCH}.tar.gz" .
          fi
          rm -rf "$STAGE"

      # Raw binary, uploaded alongside the archives so users can grab it
      # directly via `curl -L .../gospeedtest_v0.1.0_linux_amd64` without
      # having to extract a tarball first.
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: gospeedtest_${{ matrix.goos }}_${{ matrix.goarch }}_bin
          path: dist/gospeedtest_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.goarch }}${{ matrix.ext }}
          if-no-files-found: error

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: gospeedtest_${{ matrix.goos }}_${{ matrix.goarch }}
          path: dist/gospeedtest_*.tar.gz
          if-no-files-found: ignore

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: gospeedtest_${{ matrix.goos }}_${{ matrix.goarch }}_zip
          path: dist/gospeedtest_*.zip
          if-no-files-found: ignore

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: list artifacts
        run: ls -lah artifacts

      - name: compute checksums
        working-directory: artifacts
        run: |
          # Hash both archives and the raw binaries so users can verify
          # whichever asset they download.
          shasum -a 256 gospeedtest_* > checksums.txt
          cat checksums.txt

      - name: create release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: |
            artifacts/gospeedtest_*.tar.gz
            artifacts/gospeedtest_*.zip
            artifacts/gospeedtest_${{ github.ref_name }}_linux_amd64
            artifacts/gospeedtest_${{ github.ref_name }}_linux_arm64
            artifacts/gospeedtest_${{ github.ref_name }}_darwin_amd64
            artifacts/gospeedtest_${{ github.ref_name }}_darwin_arm64
            artifacts/gospeedtest_${{ github.ref_name }}_windows_amd64.exe
            artifacts/gospeedtest_${{ github.ref_name }}_windows_arm64.exe
            artifacts/checksums.txt
          generate_release_notes: true
